<!DOCTYPE html>
<html lang="bn">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>আমার বাজার - আপনার নিত্যদিনের সওদা</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

  <header class="bg-emerald-600 text-white sticky top-0 z-50 shadow-md">
    <div class="container mx-auto px-4 py-3 flex flex-wrap justify-between items-center gap-4">
      <div class="flex items-center space-x-2">
        <i class="fa-solid fa-basket-shopping text-3xl text-yellow-300"></i>
        <span class="text-2xl font-bold tracking-wide">আমার বাজার</span>
      </div>

      <div class="flex-1 max-w-md mx-4">
        <div class="relative">
          <input type="text" id="searchInput" placeholder="চাল, ডাল, মাছ, মাংস খুঁজুন..."
            class="w-full pl-10 pr-4 py-2 rounded-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-emerald-400">
          <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
        </div>
      </div>

      <button id="cartBtn"
        class="relative bg-emerald-700 hover:bg-emerald-800 px-4 py-2 rounded-lg flex items-center space-x-2 transition">
        <i class="fa-solid fa-cart-shopping text-lg"></i>
        <span class="font-semibold hidden md:inline">কার্ট</span>
        <span id="cartCount"
          class="absolute -top-2 -right-2 bg-yellow-400 text-emerald-900 text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">0</span>
      </button>
    </div>
  </header>

  <div class="container mx-auto px-4 py-6 flex flex-1 gap-6 relative">

    <aside class="w-64 shrink-0 hidden md:block">
      <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 sticky top-24">
        <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2"><i
            class="fa-solid fa-list text-emerald-600 mr-2"></i>ক্যাটাগরি</h3>
        <ul class="space-y-1" id="categoryList">
        </ul>
      </div>
    </aside>

    <main class="flex-1">
      <div class="md:hidden mb-4 overflow-x-auto whitespace-nowrap py-2 flex space-x-2" id="mobileCategoryList">
      </div>

      <h2 id="categoryTitle" class="text-2xl font-bold text-gray-800 mb-6">সব প্রোডাক্ট</h2>

      <div id="productGrid" class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      </div>
    </main>

    <div id="cartDrawer"
      class="fixed inset-y-0 right-0 w-full max-w-md bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
      <div class="bg-emerald-600 text-white p-4 flex justify-between items-center">
        <h3 class="text-lg font-bold"><i class="fa-solid fa-cart-shopping mr-2"></i>আপনার বাজার তালিকা</h3>
        <button id="closeCart" class="text-white hover:text-gray-200 text-xl font-bold">&times;</button>
      </div>

      <div id="cartItems" class="flex-1 overflow-y-auto p-4 space-y-4">
        <p class="text-gray-500 text-center py-8" id="emptyCartMessage">আপনার কার্টটি এখন খালি আছে।</p>
      </div>

      <div class="border-t p-4 bg-gray-50 space-y-4">
        <div class="flex justify-between items-center text-lg font-bold text-gray-800">
          <span>সর্বমোট মূল্য:</span>
          <span>৳ <span id="cartTotal">0</span></span>
        </div>
        <button id="checkoutBtn"
          class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-lg font-bold text-center transition">
          অর্ডার সম্পন্ন করুন
        </button>
      </div>
    </div>
  </div>

  <div id="paymentModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
    <div class="bg-white rounded-2xl w-full max-w-lg mx-4 overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
      <div class="bg-emerald-600 text-white p-4 flex justify-between items-center">

        <button id="closeModal" class="text-2xl font-bold hover:text-gray-200">&times;</button>
      </div>

      <form id="paymentForm" class="p-6 overflow-y-auto space-y-4">
        <div>
          <h4 class="font-bold text-gray-800 mb-2 border-b pb-1 text-sm uppercase">১. ডেলিভারি তথ্য</h4>
          <div class="space-y-3">
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1">আপনার নাম *</label>
              <input type="text" required id="custName"
                class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none text-sm">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1">মোবাইল নম্বর *</label>
              <input type="tel" required id="custPhone" placeholder="017XXXXXXXX"
                class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none text-sm">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1">ডেলিভারি ঠিকানা *</label>
              <textarea required id="custAddress" rows="2"
                class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none text-sm"></textarea>
            </div>
          </div>
        </div>

        <div>
          <h4 class="font-bold text-gray-800 mb-2 border-b pb-1 text-sm uppercase">২. পেমেন্ট পদ্ধতি নির্বাচন করুন</h4>
          <div class="grid grid-cols-3 gap-3">
            <label
              class="border-2 rounded-xl p-3 flex flex-col items-center justify-center cursor-pointer hover:bg-emerald-50/50 transition border-emerald-500 bg-emerald-50"
              id="codLabel">
              <input type="radio" name="paymentMethod" value="cod" checked class="hidden"
                onchange="selectPayment('cod')">
              <i class="fa-solid fa-truck text-2xl text-emerald-600 mb-1"></i>
              <span class="text-xs font-bold text-gray-700 text-center">ক্যাশ অন ডেলিভারি</span>
            </label>
            <label
              class="border-2 border-gray-200 rounded-xl p-3 flex flex-col items-center justify-center cursor-pointer hover:bg-pink-50/50 transition"
              id="bkashLabel">
              <input type="radio" name="paymentMethod" value="bkash" class="hidden" onchange="selectPayment('bkash')">
              <span class="text-pink-600 font-extrabold text-lg mb-1">bKash</span>
              <span class="text-xs font-bold text-gray-700 text-center">বিকাশ পেমেন্ট</span>
            </label>
            <label
              class="border-2 border-gray-200 rounded-xl p-3 flex flex-col items-center justify-center cursor-pointer hover:bg-orange-50/50 transition"
              id="nagadLabel">
              <input type="radio" name="paymentMethod" value="nagad" class="hidden" onchange="selectPayment('nagad')">
              <span class="text-orange-500 font-extrabold text-lg mb-1">Nagad</span>
              <span class="text-xs font-bold text-gray-700 text-center">নগদ পেমেন্ট</span>
            </label>
          </div>
        </div>

        <div id="paymentDetails" class="bg-gray-50 p-4 rounded-xl border text-sm space-y-2">
          <p class="font-bold text-gray-700" id="paymentInstruction">পণ্য হাতে পেয়ে টাকা পরিশোধ করুন।</p>
        </div>

        <div class="border-t pt-3 flex justify-between items-center text-base font-bold text-gray-800">

          <span class="text-emerald-600">৳ <span id="modalTotal">0</span></span>
        </div>

        <button type="submit"
          class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-lg font-bold text-center transition">
          অর্ডার নিশ্চিত করুন
        </button>
      </form>
    </div>

      let sidebarHtml = "";
      let mobileHtml = "";
      Object.keys(categories).forEach(key => {
        const isActive = key === currentCategory;
        const activeClasses = isActive ? "bg-emerald-100 text-emerald-800 font-bold" :
          "text-gray-600 hover:bg-gray-100";
        const mobileActiveClasses = isActive ? "bg-emerald-600 text-white" : "bg-gray-200 text-gray-700";

        sidebarHtml += `
                    <li>
                        <button onclick="filterCategory('${key}')" class="w-full text-left px-4 py-2.5 rounded-lg text-sm transition flex items-center justify-between ${activeClasses}">
                            <span>${categories[key]}</span>
                            <i class="fa-solid fa-chevron-right text-xs opacity-50"></i>
                        </button>
                    </li>
                `;

        mobileHtml += `
                    <button onclick="filterCategory('${key}')" class="px-4 py-1.5 rounded-full text-sm font-semibold transition shrink-0 ${mobileActiveClasses}">
                        ${categories[key]}
                    </button>
                `;
      });
      categoryList.innerHTML = sidebarHtml;
      mobileCategoryList.innerHTML = mobileHtml;
    }

          `<p class="col-span-full text-center text-gray-500 py-12">কোনো প্রোডাক্ট খুঁজে পাওয়া যায়নি!</p>`;
        return;
      }
      productGrid.innerHTML = productsToRender.map(product => `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col justify-between hover:shadow-md transition duration-200">
                    <img src="${product.image}" alt="${product.name}" class="h-32 sm:h-44 w-full object-cover bg-gray-100">
                    <div class="p-3 sm:p-4 flex flex-col flex-1 justify-between">
                        <div>
                            <span class="text-[10px] text-gray-400 font-semibold block uppercase">${categories[product.category]}</span>
                            <h4 class="text-sm sm:text-base font-bold text-gray-800 mt-1 line-clamp-1">${product.name}</h4>
                            <p class="text-xs text-gray-500 mt-1">${product.unit}</p>
                        </div>
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between mt-3 gap-2">
                            <span class="text-base sm:text-lg font-extrabold text-emerald-600">৳ ${product.price}</span>
                            <button onclick="addToCart(${product.id})" class="bg-emerald-50 hover:bg-emerald-600 text-emerald-700 hover:text-white px-2 py-1.5 sm:px-3 sm:py-2 rounded-lg font-bold text-xs transition flex items-center justify-center space-x-1">
                                <i class="fa-solid fa-plus"></i>
                                <span>অ্যাড করুন</span>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
    }

    // --- 6. INTERACTIVE FUNCTIONS ---
    window.filterCategory = function (categoryKey) {
      currentCategory = categoryKey;
      categoryTitle.textContent = categories[categoryKey];
      renderCategories();
      if (categoryKey === "all") {
        renderProducts(products);
      } else {
        renderProducts(products.filter(p => p.category === categoryKey));
      }
    };

    window.addToCart = function (productId) {
      const product = products.find(p => p.id === productId);
      const existingCartItem = cart.find(item => item.id === productId);
      if (existingCartItem) {
        existingCartItem.quantity += 1;
      } else {
        cart.push({
          ...product,
          quantity: 1
        });
      }
      updateCart();
      cartDrawer.classList.remove('translate-x-full'); // Auto open cart
    };

    window.updateQuantity = function (productId, action) {
      const item = cart.find(item => item.id === productId);
      if (item) {
        if (action === 'increase') {
          item.quantity += 1;
        } else if (action === 'decrease') {
          item.quantity -= 1;
          if (item.quantity === 0) {
            cart = cart.filter(cartItem => cartItem.id !== productId);
          }
        }
      }
      updateCart();
    };

    function updateCart() {
      const totalItemsCount = cart.reduce((total, item) => total + item.quantity, 0);
      const totalCartPrice = cart.reduce((total, item) => total + (item.price * item.quantity), 0);

      cartCount.textContent = totalItemsCount;
      cartTotal.textContent = totalCartPrice;

      if (cart.length === 0) {
        emptyCartMessage.classList.remove('hidden');
        cartItemsContainer.querySelectorAll('.cart-item').forEach(el => el.remove());
      } else {
        emptyCartMessage.classList.add('hidden');
        cartItemsContainer.innerHTML = cart.map(item => `
                    <div class="cart-item flex items-center justify-between border-b pb-3">
                        <div class="flex items-center space-x-3">
                            <img src="${item.image}" class="w-12 h-12 object-cover rounded-md">
                            <div>
                                <h5 class="font-bold text-gray-800 text-sm">${item.name}</h5>
                                <p class="text-xs text-gray-500">৳ ${item.price} x ${item.quantity}</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <button onclick="updateQuantity(${item.id}, 'decrease')" class="bg-gray-200 text-gray-800 w-7 h-7 rounded flex items-center justify-center font-bold">-</button>
                            <span class="font-bold text-gray-800 text-sm w-4 text-center">${item.quantity}</span>
                            <button onclick="updateQuantity(${item.id}, 'increase')" class="bg-gray-200 text-gray-800 w-7 h-7 rounded flex items-center justify-center font-bold">+</button>
                        </div>
                    </div>
                `).join('');
      }
    }

    // --- 7. PAYMENT & GATEWAY SYSTEM ---
    window.selectPayment = function (method) {
      const codLabel = document.getElementById('codLabel');
      const bkashLabel = document.getElementById('bkashLabel');
      const nagadLabel = document.getElementById('nagadLabel');

      // Reset Styles
      [codLabel, bkashLabel, nagadLabel].forEach(label => {
        label.classList.remove('border-emerald-500', 'bg-emerald-50', 'border-pink-500', 'bg-pink-50',
          'border-orange-500', 'bg-orange-50');
        label.classList.add('border-gray-200');
      });

      // Set Active Styles & Instructions
      if (method === 'cod') {
        codLabel.classList.add('border-emerald-500', 'bg-emerald-50');
        paymentInstruction.innerHTML =
          `<i class="fa-solid fa-info-circle text-emerald-600 mr-1"></i> আপনার ক্যাশ অন ডেলিভারি সিলেক্ট করা হয়েছে। অর্ডার রিসিভ করার সময় পেমেন্ট করবেন।`;
      } else if (method === 'bkash') {
        bkashLabel.classList.add('border-pink-500', 'bg-pink-50');
        paymentInstruction.innerHTML = `
                    <p class="font-bold text-pink-600 mb-1">বিকাশ পেমেন্ট গেটওয়ে:</p>
                    <p class="text-xs text-gray-600">আমাদের মার্চেন্ট অ্যাকাউন্ট নম্বরে (<b>০১৭০০-০০০০০০</b>) পেমেন্ট সম্পূর্ণ করে ট্রানজেকশন আইডিটি ডেলিভারিম্যানকে দেখান।</p>
                `;
      } else if (method === 'nagad') {
        nagadLabel.classList.add('border-orange-500', 'bg-orange-50');
        paymentInstruction.innerHTML = `
                    <p class="font-bold text-orange-600 mb-1">নগদ পেমেন্ট গেটওয়ে:</p>
                    <p class="text-xs text-gray-600">আমাদের নগদ মার্চেন্ট নম্বরে (<b>০১৮০০-০০০০০০</b>) পেমেন্ট সম্পন্ন করে আপনার অর্ডারটি কনফার্ম করুন।</p>
                `;
      }
    };

    // --- 8. EVENT LISTENERS ---
    function setupEventListeners() {
      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        const filtered = products.filter(product => product.name.toLowerCase().includes(query));
        renderProducts(filtered);
      });

      cartBtn.addEventListener('click', () => cartDrawer.classList.toggle('translate-x-full'));
      closeCart.addEventListener('click', () => cartDrawer.classList.add('translate-x-full'));

      // Open Payment Modal
      checkoutBtn.addEventListener('click', () => {
        if (cart.length === 0) {
          alert('আপনার কার্টটি সম্পূর্ণ খালি! দয়া করে কিছু প্রোডাক্ট যোগ করুন।');
        } else {
          const totalCartPrice = cart.reduce((total, item) => total + (item.price * item.quantity), 0);
          modalTotal.textContent = totalCartPrice;
          paymentModal.classList.remove('hidden');
          cartDrawer.classList.add('translate-x-full');
        }
      });

      // Close Modal
      closeModal.addEventListener('click', () => paymentModal.classList.add('hidden'));

      // Handle Order Submission
      paymentForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const address = document.getElementById('custAddress').value;
        const activePayment = document.querySelector('input[name="paymentMethod"]:checked').value;

        alert(
          `🎉 অভিনন্দন ${name}!\nআপনার অর্ডারটি সফলভাবে সম্পন্ন হয়েছে।\n\n💵 মোট মূল্য: ৳ ${modalTotal.textContent}\n🚚 ঠিকানা: ${address}\n💳 পেমেন্ট টাইপ: ${activePayment.toUpperCase()}`
          );

        cart = [];
        updateCart();
        paymentForm.reset();
        paymentModal.classList.add('hidden');
      });
    }
  </script>
</body>

</html>
