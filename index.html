<!DOCTYPE html>
<html lang="bn">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>আমার বাজার - আপনার নিত্যদিনের সওদা</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

  <header class="bg-emerald-600 text-white sticky top-0 z-50 shadow-md">
    <div class="container mx-auto px-4 py-3 flex flex-wrap justify-between items-center gap-4">
      <div class="flex items-center space-x-2">
        <i class="fa-solid fa-basket-shopping text-3xl text-yellow-300"></i>
        <span class="text-2xl font-bold tracking-wide">আমার বাজার</span>
      </div>

      <div class="flex-1 max-w-md mx-4">
        <div class="relative">
          <input type="text" id="searchInput" placeholder="চাল, ডাল, মাছ, মাংস খুঁজুন..."
            class="w-full pl-10 pr-4 py-2 rounded-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-emerald-400">
          <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
        </div>
      </div>

      <button id="cartBtn"
        class="relative bg-emerald-700 hover:bg-emerald-800 px-4 py-2 rounded-lg flex items-center space-x-2 transition">
        <i class="fa-solid fa-cart-shopping text-lg"></i>
        <span class="font-semibold hidden md:inline">কার্ট</span>
        <span id="cartCount"
          class="absolute -top-2 -right-2 bg-yellow-400 text-emerald-900 text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">0</span>
      </button>
    </div>
  </header>

  <div class="container mx-auto px-4 py-6 flex flex-1 gap-6 relative">

    <aside class="w-64 shrink-0 hidden md:block">
      <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 sticky top-24">
        <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2"><i
            class="fa-solid fa-list text-emerald-600 mr-2"></i>ক্যাটাগরি</h3>
        <ul class="space-y-1" id="categoryList">
        </ul>
      </div>
    </aside>

    <main class="flex-1">
      <div class="md:hidden mb-4 overflow-x-auto whitespace-nowrap py-2 flex space-x-2" id="mobileCategoryList">
      </div>

      <h2 id="categoryTitle" class="text-2xl font-bold text-gray-800 mb-6">সব প্রোডাক্ট</h2>

      <div id="productGrid" class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      </div>
    </main>

    <div id="cartDrawer"
      class="fixed inset-y-0 right-0 w-full max-w-md bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
      <div class="bg-emerald-600 text-white p-4 flex justify-between items-center">
        <h3 class="text-lg font-bold"><i class="fa-solid fa-cart-shopping mr-2"></i>আপনার বাজার তালিকা</h3>
        <button id="closeCart" class="text-white hover:text-gray-200 text-xl font-bold">&times;</button>
      </div>

      <div id="cartItems" class="flex-1 overflow-y-auto p-4 space-y-4">
        <p class="text-gray-500 text-center py-8" id="emptyCartMessage">আপনার কার্টটি এখন খালি আছে।</p>
      </div>

      <div class="border-t p-4 bg-gray-50 space-y-4">
        <div class="flex justify-between items-center text-lg font-bold text-gray-800">
          <span>সর্বমোট মূল্য:</span>
          <span>৳ <span id="cartTotal">0</span></span>
        </div>
        <button id="checkoutBtn"
          class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-lg font-bold text-center transition">
          অর্ডার সম্পন্ন করুন
        </button>
      </div>
    </div>
  </div>

  <div id="paymentModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
    <div class="bg-white rounded-2xl w-full max-w-lg mx-4 overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
      <div class="bg-emerald-600 text-white p-4 flex justify-between items-center">
        <h3 class="text-lg font-bold"><i class="fa-solid fa-credit-card mr-2"></i>অর্ডার ও পেমেন্ট করুন</h3>
        <button id="closeModal" class="text-2xl font-bold hover:text-gray-200">&times;</button>
      </div>

      <form id="paymentForm" class="p-6 overflow-y-auto space-y-4">
        <div>
          <h4 class="font-bold text-gray-800 mb-2 border-b pb-1 text-sm uppercase">১. ডেলিভারি তথ্য</h4>
          <div class="space-y-3">
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1">আপনার নাম *</label>
              <input type="text" required id="custName"
                class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none text-sm">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1">মোবাইল নম্বর *</label>
              <input type="tel" required id="custPhone" placeholder="017XXXXXXXX"
                class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none text-sm">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1">ডেলিভারি ঠিকানা *</label>
              <textarea required id="custAddress" rows="2"
                class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none text-sm"></textarea>
            </div>
          </div>
        </div>

        <div>
          <h4 class="font-bold text-gray-800 mb-2 border-b pb-1 text-sm uppercase">২. পেমেন্ট পদ্ধতি নির্বাচন করুন</h4>
          <div class="grid grid-cols-3 gap-3">
            <label
              class="border-2 rounded-xl p-3 flex flex-col items-center justify-center cursor-pointer hover:bg-emerald-50/50 transition border-emerald-500 bg-emerald-50"
              id="codLabel">
              <input type="radio" name="paymentMethod" value="cod" checked class="hidden"
                onchange="selectPayment('cod')">
              <i class="fa-solid fa-truck text-2xl text-emerald-600 mb-1"></i>
              <span class="text-xs font-bold text-gray-700 text-center">ক্যাশ অন ডেলিভারি</span>
            </label>
            <label
              class="border-2 border-gray-200 rounded-xl p-3 flex flex-col items-center justify-center cursor-pointer hover:bg-pink-50/50 transition"
              id="bkashLabel">
              <input type="radio" name="paymentMethod" value="bkash" class="hidden" onchange="selectPayment('bkash')">
              <span class="text-pink-600 font-extrabold text-lg mb-1">bKash</span>
              <span class="text-xs font-bold text-gray-700 text-center">বিকাশ পেমেন্ট</span>
            </label>
            <label
              class="border-2 border-gray-200 rounded-xl p-3 flex flex-col items-center justify-center cursor-pointer hover:bg-orange-50/50 transition"
              id="nagadLabel">
              <input type="radio" name="paymentMethod" value="nagad" class="hidden" onchange="selectPayment('nagad')">
              <span class="text-orange-500 font-extrabold text-lg mb-1">Nagad</span>
              <span class="text-xs font-bold text-gray-700 text-center">নগদ পেমেন্ট</span>
            </label>
          </div>
        </div>

        <div id="paymentDetails" class="bg-gray-50 p-4 rounded-xl border text-sm space-y-2">
          <p class="font-bold text-gray-700" id="paymentInstruction">পণ্য হাতে পেয়ে টাকা পরিশোধ করুন।</p>
        </div>

        <div class="border-t pt-3 flex justify-between items-center text-base font-bold text-gray-800">
          <span>পরিশোধযোগ্য মোট মূল্য:</span>
          <span class="text-emerald-600">৳ <span id="modalTotal">0</span></span>
        </div>

        <button type="submit"
          class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-lg font-bold text-center transition">
          অর্ডার নিশ্চিত করুন
        </button>
      </form>
    </div>
  </div>

  
  <script src="app.js"></script>
</body>

</html>
